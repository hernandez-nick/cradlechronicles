{% extends 'base.html' %} {% load static %} {% block head %}
<link rel="stylesheet" href="{% static 'css/home.css' %}" />{% endblock %}
{% block content %}
<section class="auth-wrap">
  <div class="auth-brand">

    <h1>Cradle Chronicles</h1>
    <p class="tagline">Capture the moments you'll treasure forever</p>
  </div>

  <form class="auth-card" method="post" action="{% url 'home' %}">
    {% csrf_token %}
    {{ form.as_p }}
    <input type="hidden" name="next" value="{{ next }}" />
    <div class="auth-actions">
      <button type="submit" class="btn primary">Log In</button>
      <a href="{% url 'signup' %}" class="btn secondary">Sign Up</a>
    </div>
    <p class="auth-foot">Every milestone matters. Start your chronicle today.</p>
  </form>
</section>
{% endblock %}
