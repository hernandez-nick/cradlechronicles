{% extends 'base.html' %} 
{% load static %} 
{% block head %}
<link rel="stylesheet" href="{% static 'css/milestones/milestone-detail.css' %}" />
{% endblock %} 
{% block content %}
<section class="milestone-container">
    <div class="milestone-img">
        <img src="{% static '' %}" alt="{{ milestone.title }}" />
    </div>
    <div class="milestone-details">
        <h1>{{ milestone.title }}</h1>
        <p>{{ milestone.description }}</p>
    </div>
</section>
{% endblock %}
