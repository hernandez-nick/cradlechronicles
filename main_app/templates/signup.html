{% extends 'base.html' %}
{% load static %}
{% block head %}<link rel="stylesheet" href="{% static 'css/home.css' %}" />{% endblock %}
{% block content %}
<section class="auth-wrap">
  <div class="auth-brand">

    <h1>Create your chronicle</h1>
    <p class="tagline">Every milestone matters.</p>
  </div>
  {% if error_message %}<p class="error">{{ error_message }}</p>{% endif %}
  <form class="auth-card" method="post" autocomplete="off">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="auth-actions">
      <button type="submit" class="btn primary">Sign Up</button>
      <a href="{% url 'home' %}" class="btn secondary">Cancel</a>
    </div>
  </form>
</section>
{% endblock %}
